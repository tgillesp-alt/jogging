<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Løpelogg</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg:#14171a;
    --panel:#1c2023;
    --panel-2:#22262a;
    --line:#2c3136;
    --chalk:#f5f3ee;
    --muted:#888f96;
    --orange:#ff5a1f;
    --teal:#35d0ba;
    --red:#ff5a5a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    background-image:
      repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 64px);
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 80px;}

  /* header */
  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:18px;
  }
  .brand{
    font-family:'Bebas Neue',sans-serif;
    font-size:40px;
    letter-spacing:1px;
    line-height:0.9;
    color:var(--chalk);
  }
  .brand span{color:var(--orange);}
  .brand-sub{
    font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;
  }
  .bib{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--muted);
    border:1px solid var(--line);
    padding:4px 8px;border-radius:4px;
    transform:rotate(2deg);
  }

  /* hero scoreboard */
  .scoreboard{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 18px 14px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .scoreboard::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--orange),var(--teal));
  }
  .sb-row{display:flex;gap:10px;}
  .sb-cell{flex:1;text-align:center;padding:10px 4px;}
  .sb-num{
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;
    line-height:1;
    color:var(--chalk);
  }
  .sb-num.accent{color:var(--orange);}
  .sb-num.teal{color:var(--teal);}
  .sb-label{
    font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;
  }
  .sb-divider{width:1px;background:var(--line);margin:6px 0;}

  /* weekly goal */
  .goal-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:14px;
  }
  .goal-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .goal-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
  .goal-edit{
    background:none;border:none;color:var(--teal);font-size:11px;
    font-family:'IBM Plex Mono',monospace;cursor:pointer;padding:2px 6px;
  }
  .goal-track{
    height:10px;background:var(--panel-2);border-radius:6px;overflow:hidden;border:1px solid var(--line);
  }
  .goal-fill{
    height:100%;background:linear-gradient(90deg,var(--teal),var(--orange));
    border-radius:6px;transition:width .4s ease;
  }
  .goal-meta{
    display:flex;justify-content:space-between;margin-top:6px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);
  }
  .goal-form{display:flex;gap:8px;margin-top:10px;}
  .goal-form input{
    flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--chalk);
    border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;
  }
  .goal-form button{
    background:var(--orange);color:#14171a;border:none;border-radius:8px;
    padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;
  }

  /* section titles */
  .section-title{
    display:flex;align-items:center;gap:8px;
    font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);
    margin:22px 0 10px;
  }
  .section-title::after{content:"";flex:1;height:1px;background:var(--line);}

  /* add run button */
  .add-btn{
    width:100%;
    background:var(--panel);border:1px dashed var(--line);color:var(--chalk);
    border-radius:12px;padding:14px;font-size:14px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:border-color .2s;
  }
  .add-btn:hover{border-color:var(--orange);}
  .add-btn .plus{color:var(--orange);font-size:18px;}

  /* form panel */
  .form-panel{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-top:10px;display:none;
  }
  .form-panel.open{display:block;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .field input, .field select, .field textarea{
    background:var(--panel-2);border:1px solid var(--line);color:var(--chalk);
    border-radius:8px;padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;
  }
  .field textarea{font-family:'Inter',sans-serif;resize:vertical;min-height:44px;}
  .form-actions{display:flex;gap:8px;margin-top:14px;}
  .btn-primary{
    flex:1;background:var(--orange);color:#14171a;border:none;border-radius:8px;
    padding:11px;font-weight:700;font-size:14px;cursor:pointer;
  }
  .btn-secondary{
    background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;
    padding:11px 16px;font-size:14px;cursor:pointer;
  }
  .pace-preview{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--teal);
    margin-top:8px;min-height:16px;
  }

  /* charts */
  .chart-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px 14px 8px;margin-bottom:12px;
  }
  .chart-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
  .chart-empty{
    font-size:13px;color:var(--muted);padding:20px 0;text-align:center;
  }

  /* run list */
  .run-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:0;margin-bottom:10px;display:flex;overflow:hidden;
  }
  .run-bib{
    font-family:'Bebas Neue',sans-serif;
    background:var(--panel-2);
    color:var(--muted);
    width:52px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    border-right:1px dashed var(--line);
  }
  .run-body{flex:1;padding:12px 14px;}
  .run-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .run-date{font-size:13px;font-weight:600;color:var(--chalk);}
  .run-type{
    font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:1px;
    border:1px solid rgba(53,208,186,0.35);border-radius:4px;padding:2px 6px;
  }
  .run-stats{
    display:flex;gap:14px;flex-wrap:wrap;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);
  }
  .run-stats b{color:var(--chalk);font-weight:600;}
  .run-notes{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;}
  .run-actions{
    display:flex;align-items:center;padding:0 10px;border-left:1px solid var(--line);
  }
  .del-btn{
    background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:6px;
  }
  .del-btn:hover{color:var(--red);}

  .empty-state{
    text-align:center;padding:30px 16px;color:var(--muted);font-size:13px;
    border:1px dashed var(--line);border-radius:12px;
  }
  .loading{text-align:center;color:var(--muted);font-size:13px;padding:20px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand">LØPE<span>LOGG</span></div>
      <div class="brand-sub">Utvikling · Puls · Fart</div>
    </div>
    <div class="bib" id="runCountBadge">#000</div>
  </header>

  <div class="scoreboard">
    <div class="sb-row">
      <div class="sb-cell">
        <div class="sb-num accent" id="statTotalKm">0.0</div>
        <div class="sb-label">Km totalt</div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-cell">
        <div class="sb-num teal" id="statAvgPace">–</div>
        <div class="sb-label">Snittfart /km</div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-cell">
        <div class="sb-num" id="statBestPace">–</div>
        <div class="sb-label">Beste fart /km</div>
      </div>
    </div>
  </div>

  <div class="goal-box">
    <div class="goal-top">
      <div class="goal-title">Ukesmål (minutter)</div>
      <button class="goal-edit" id="editGoalBtn">Endre</button>
    </div>
    <div class="goal-track"><div class="goal-fill" id="goalFill" style="width:0%"></div></div>
    <div class="goal-meta">
      <span id="goalNowMin">0 min</span>
      <span id="goalTargetMin">av 90 min</span>
    </div>
    <div class="goal-form" id="goalForm" style="display:none;">
      <input type="number" id="goalInput" placeholder="90" min="1">
      <button onclick="saveGoal()">Lagre</button>
    </div>
  </div>

  <button class="add-btn" id="toggleFormBtn"><span class="plus">+</span> Registrer løpetur</button>

  <div class="form-panel" id="formPanel">
    <div class="form-grid">
      <div class="field">
        <label>Dato</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="fType">
          <option value="Intervall">Intervall</option>
          <option value="Sammenhengende">Sammenhengende</option>
          <option value="Langtur">Langtur</option>
        </select>
      </div>
      <div class="field">
        <label>Distanse (km)</label>
        <input type="number" step="0.01" id="fDist" placeholder="2.18" oninput="updatePacePreview()">
      </div>
      <div class="field">
        <label>Tid (mm:ss)</label>
        <input type="text" id="fDur" placeholder="25:35" oninput="updatePacePreview()">
      </div>
      <div class="field">
        <label>Snittpuls (bpm)</label>
        <input type="number" id="fHr" placeholder="140">
      </div>
      <div class="field">
        <label>Kalorier</label>
        <input type="number" id="fCal" placeholder="150">
      </div>
      <div class="field full">
        <label>Sted</label>
        <input type="text" id="fLoc" placeholder="Frognerparken">
      </div>
      <div class="field full">
        <label>Notat</label>
        <textarea id="fNotes" placeholder="Følelse, vær, sko, osv."></textarea>
      </div>
    </div>
    <div class="pace-preview" id="pacePreview"></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="saveRun()">Lagre løpetur</button>
      <button class="btn-secondary" onclick="closeForm()">Avbryt</button>
    </div>
  </div>

  <div class="section-title">Fartsutvikling</div>
  <div class="chart-card">
    <div class="chart-title">Min/km per økt (lavere = raskere)</div>
    <div id="paceChartWrap"><div class="chart-empty">Ingen data ennå</div></div>
  </div>

  <div class="section-title">Distanse per økt</div>
  <div class="chart-card">
    <div class="chart-title">Kilometer</div>
    <div id="distChartWrap"><div class="chart-empty">Ingen data ennå</div></div>
  </div>

  <div class="section-title">Logg</div>
  <div id="runList"><div class="loading">Laster…</div></div>

</div>

<script>
let runs = [];
let weeklyGoal = 90;

const SUPABASE_URL = 'https://bybmidseadqalahvamuz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5Ym1pZHNlYWRxYWxhaHZhbXV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzAzMDgsImV4cCI6MjA5OTEwNjMwOH0.-kh4JhPPNQdHeatqpmsLBZuY-vccKUarEBeuV5HU7Fo';

function sbHeaders(extra={}){
  return Object.assign({
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  }, extra);
}

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
document.getElementById('fDate').value = todayStr();

function rowToRun(row){
  return { id: row.id, date: row.date, type: row.type, dist: Number(row.dist),
    durMin: Number(row.dur_min), hr: row.hr!=null?Number(row.hr):null,
    cal: row.cal!=null?Number(row.cal):null, loc: row.loc||'', notes: row.notes||'' };
}

async function loadData(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/runs?select=*&order=date.asc`, {headers: sbHeaders()});
    const rows = await res.json();
    runs = Array.isArray(rows) ? rows.map(rowToRun) : [];
  }catch(e){ console.error('Kunne ikke hente løpeturer', e); runs = []; }

  if(runs.length === 0){
    // seed the two runs Thomas already logged
    const seed = [
      { date:'2026-07-04', type:'Intervall', dist:2.18, dur_min:25+35/60, hr:140, cal:150, loc:'Frognerparken', notes:'' },
      { date:'2026-07-06', type:'Intervall', dist:3.41, dur_min:36+32/60, hr:130, cal:224, loc:'Sognsvann', notes:'' }
    ];
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/runs`, {
        method:'POST', headers: sbHeaders({'Prefer':'return=representation'}), body: JSON.stringify(seed)
      });
      const res2 = await fetch(`${SUPABASE_URL}/rest/v1/runs?select=*&order=date.asc`, {headers: sbHeaders()});
      const rows2 = await res2.json();
      runs = Array.isArray(rows2) ? rows2.map(rowToRun) : [];
    }catch(e){ console.error('Kunne ikke sette inn eksempeldata', e); }
  }

  try{
    const res3 = await fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.weekly_goal&select=value`, {headers: sbHeaders()});
    const data = await res3.json();
    weeklyGoal = (Array.isArray(data) && data.length) ? parseFloat(data[0].value) : 90;
  }catch(e){ weeklyGoal = 90; }

  render();
}

async function persistGoal(){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
      method:'POST',
      headers: sbHeaders({'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify({ key:'weekly_goal', value:String(weeklyGoal) })
    });
  }catch(e){ console.error('Kunne ikke lagre mål', e); }
}

// ---- form toggling ----
document.getElementById('toggleFormBtn').addEventListener('click', ()=>{
  document.getElementById('formPanel').classList.add('open');
  document.getElementById('toggleFormBtn').style.display = 'none';
});
function closeForm(){
  document.getElementById('formPanel').classList.remove('open');
  document.getElementById('toggleFormBtn').style.display = 'flex';
  ['fDist','fDur','fHr','fCal','fLoc','fNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pacePreview').textContent = '';
}

function parseDuration(str){
  // accepts mm:ss or h:mm:ss
  const parts = str.trim().split(':').map(Number);
  if(parts.some(isNaN)) return null;
  if(parts.length === 2) return parts[0] + parts[1]/60;
  if(parts.length === 3) return parts[0]*60 + parts[1] + parts[2]/60;
  return null;
}
function formatPace(minPerKm){
  if(!isFinite(minPerKm) || minPerKm <= 0) return '–';
  const m = Math.floor(minPerKm);
  const s = Math.round((minPerKm - m)*60);
  return m + ":" + String(s).padStart(2,'0');
}

function updatePacePreview(){
  const dist = parseFloat(document.getElementById('fDist').value);
  const durMin = parseDuration(document.getElementById('fDur').value || '');
  const el = document.getElementById('pacePreview');
  if(dist > 0 && durMin){
    el.textContent = 'Fart: ' + formatPace(durMin/dist) + ' /km';
  } else {
    el.textContent = '';
  }
}

async function saveRun(){
  const date = document.getElementById('fDate').value;
  const type = document.getElementById('fType').value;
  const dist = parseFloat(document.getElementById('fDist').value);
  const durMin = parseDuration(document.getElementById('fDur').value || '');
  const hr = parseFloat(document.getElementById('fHr').value) || null;
  const cal = parseFloat(document.getElementById('fCal').value) || null;
  const loc = document.getElementById('fLoc').value.trim();
  const notes = document.getElementById('fNotes').value.trim();

  if(!date || !dist || dist<=0 || !durMin || durMin<=0){
    alert('Fyll inn dato, distanse og tid (mm:ss) for å lagre.');
    return;
  }

  try{
    await fetch(`${SUPABASE_URL}/rest/v1/runs`, {
      method:'POST',
      headers: sbHeaders({'Prefer':'return=minimal'}),
      body: JSON.stringify({ date, type, dist, dur_min: durMin, hr, cal, loc, notes })
    });
  }catch(e){ console.error('Kunne ikke lagre løpetur', e); alert('Kunne ikke lagre. Sjekk internettforbindelsen.'); return; }

  closeForm();
  await loadData();
}

async function deleteRun(id){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/runs?id=eq.${id}`, { method:'DELETE', headers: sbHeaders() });
  }catch(e){ console.error('Kunne ikke slette løpetur', e); }
  await loadData();
}

// ---- weekly goal ----
document.getElementById('editGoalBtn').addEventListener('click', ()=>{
  const f = document.getElementById('goalForm');
  f.style.display = f.style.display === 'none' ? 'flex' : 'none';
  document.getElementById('goalInput').value = weeklyGoal;
});
async function saveGoal(){
  const v = parseFloat(document.getElementById('goalInput').value);
  if(v > 0){
    weeklyGoal = v;
    await persistGoal();
    document.getElementById('goalForm').style.display = 'none';
    render();
  }
}

function isoWeekStart(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const day = (d.getDay()+6)%7; // Monday=0
  d.setDate(d.getDate()-day);
  return d.toISOString().slice(0,10);
}

function render(){
  document.getElementById('runCountBadge').textContent = '#' + String(runs.length).padStart(3,'0');

  // scoreboard
  const totalKm = runs.reduce((s,r)=>s+r.dist,0);
  document.getElementById('statTotalKm').textContent = totalKm.toFixed(1);
  if(runs.length){
    const totalMin = runs.reduce((s,r)=>s+r.durMin,0);
    document.getElementById('statAvgPace').textContent = formatPace(totalMin/totalKm);
    const best = Math.min(...runs.map(r=>r.durMin/r.dist));
    document.getElementById('statBestPace').textContent = formatPace(best);
  } else {
    document.getElementById('statAvgPace').textContent = '–';
    document.getElementById('statBestPace').textContent = '–';
  }

  // weekly goal — current calendar week
  const thisWeekStart = isoWeekStart(todayStr());
  const weekMin = runs
    .filter(r => isoWeekStart(r.date) === thisWeekStart)
    .reduce((s,r)=>s+r.durMin,0);
  const pct = Math.min(100, (weekMin/weeklyGoal)*100);
  document.getElementById('goalFill').style.width = pct + '%';
  document.getElementById('goalNowMin').textContent = Math.round(weekMin) + ' min';
  document.getElementById('goalTargetMin').textContent = 'av ' + weeklyGoal + ' min';

  renderCharts();
  renderList();
}

function renderCharts(){
  const sorted = [...runs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-15);
  renderLineChart('paceChartWrap', sorted, r => r.durMin/r.dist, true, 'var(--teal)');
  renderBarChart('distChartWrap', sorted, r => r.dist, 'var(--orange)');
}

function renderLineChart(containerId, data, valueFn, invert, color){
  const el = document.getElementById(containerId);
  if(!data.length){ el.innerHTML = '<div class="chart-empty">Ingen data ennå</div>'; return; }
  const w = 500, h = 130, pad = 24;
  const values = data.map(valueFn);
  let min = Math.min(...values), max = Math.max(...values);
  if(min === max){ min -= 1; max += 1; }
  const points = values.map((v,i)=>{
    const x = pad + (i/(values.length-1 || 1)) * (w - pad*2);
    let norm = (v - min)/(max - min);
    if(invert) norm = 1 - norm; // lower pace = higher on chart (better)
    const y = pad + norm * (h - pad*2);
    return [x,y];
  });
  const path = points.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const dots = points.map((p,i)=>
    `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${color}"><title>${formatPace(values[i])} /km — ${data[i].date}</title></circle>`
  ).join('');
  el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;overflow:visible;">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}
  </svg>`;
}

function renderBarChart(containerId, data, valueFn, color){
  const el = document.getElementById(containerId);
  if(!data.length){ el.innerHTML = '<div class="chart-empty">Ingen data ennå</div>'; return; }
  const w = 500, h = 130, pad = 10, gap = 6;
  const values = data.map(valueFn);
  const max = Math.max(...values, 0.1);
  const barW = (w - pad*2 - gap*(data.length-1)) / data.length;
  const bars = values.map((v,i)=>{
    const bh = (v/max) * (h - pad*2);
    const x = pad + i*(barW+gap);
    const y = h - pad - bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"><title>${v.toFixed(2)} km — ${data[i].date}</title></rect>`;
  }).join('');
  el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;">${bars}</svg>`;
}

function renderList(){
  const el = document.getElementById('runList');
  if(!runs.length){
    el.innerHTML = '<div class="empty-state">Ingen løpeturer registrert ennå.<br>Trykk «Registrer løpetur» for å komme i gang.</div>';
    return;
  }
  const sorted = [...runs].sort((a,b)=> b.date.localeCompare(a.date));
  el.innerHTML = sorted.map((r,i)=>{
    const pace = formatPace(r.durMin/r.dist);
    const durStr = Math.floor(r.durMin) + ':' + String(Math.round((r.durMin%1)*60)).padStart(2,'0');
    const dateFmt = new Date(r.date+'T00:00:00').toLocaleDateString('no-NO', {weekday:'short', day:'numeric', month:'short'});
    return `<div class="run-card">
      <div class="run-bib">${String(sorted.length-i).padStart(2,'0')}</div>
      <div class="run-body">
        <div class="run-top">
          <div class="run-date">${dateFmt}${r.loc ? ' · ' + r.loc : ''}</div>
          <div class="run-type">${r.type}</div>
        </div>
        <div class="run-stats">
          <span><b>${r.dist.toFixed(2)}</b> km</span>
          <span><b>${durStr}</b> tid</span>
          <span><b>${pace}</b> /km</span>
          ${r.hr ? `<span><b>${r.hr}</b> bpm</span>` : ''}
          ${r.cal ? `<span><b>${r.cal}</b> kcal</span>` : ''}
        </div>
        ${r.notes ? `<div class="run-notes">"${r.notes}"</div>` : ''}
      </div>
      <div class="run-actions">
        <button class="del-btn" onclick="deleteRun(${r.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
